<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERDA Calligraphy — Text Visual Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 14px;
    letter-spacing: 0.3em;
    color: #D4A537;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 900px;
    width: 100%;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-group label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input[type="file"] { display: none; }
  .btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .btn:hover { border-color: #D4A537; }
  textarea {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px;
    font-size: 12px;
    font-family: inherit;
    resize: vertical;
    width: 100%;
    max-width: 900px;
    height: 80px;
    margin-bottom: 12px;
  }
  textarea:focus { outline: none; border-color: #D4A537; }
  .sliders {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .slider-group label {
    font-size: 9px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .slider-group input[type="range"] {
    width: 120px;
    accent-color: #D4A537;
  }
  .slider-group .value {
    font-size: 10px;
    color: #D4A537;
    font-variant-numeric: tabular-nums;
  }
  #output-wrap {
    position: relative;
    background: #111;
    border: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
  }
  #output-canvas {
    display: block;
    max-width: 90vw;
    max-height: 70vh;
  }
  .hint {
    color: #444;
    font-size: 12px;
    position: absolute;
  }
  .actions {
    margin-top: 12px;
    display: flex;
    gap: 12px;
  }
  select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: #D4A537; }
  #status {
    font-size: 10px;
    color: #555;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<h1>NERDA — Calligraphic Text Visualization</h1>

<div class="controls">
  <div class="control-group">
    <label>画像</label>
    <button class="btn" id="btn-upload">画像を選択</button>
    <input type="file" id="input-image" accept="image/*">
  </div>
  <div class="control-group">
    <label>背景色</label>
    <select id="select-bg">
      <option value="black" selected>黒背景・白文字</option>
      <option value="white">白背景・黒文字</option>
    </select>
  </div>
  <div class="control-group">
    <label>配置モード</label>
    <select id="select-mode">
      <option value="grid" selected>グリッド</option>
      <option value="flow">フロー（曲線）</option>
      <option value="contour">パス（輪郭追従）</option>
    </select>
  </div>
</div>

<textarea id="input-text" placeholder="ここにテキストを入力（画像を構成する文字として使われます）">言葉が形になる。光と影の間に、文字が呼吸する。NERDAは見ている。あなたの輪郭を、言葉で描く。Every word becomes a shape. Between light and shadow, letters breathe.</textarea>

<div class="sliders">
  <div class="slider-group">
    <label>文字サイズ 最小</label>
    <input type="range" id="slider-min" min="3" max="20" value="5">
    <span class="value" id="val-min">5px</span>
  </div>
  <div class="slider-group">
    <label>文字サイズ 最大</label>
    <input type="range" id="slider-max" min="8" max="60" value="24">
    <span class="value" id="val-max">24px</span>
  </div>
  <div class="slider-group">
    <label>密度</label>
    <input type="range" id="slider-density" min="1" max="10" value="5">
    <span class="value" id="val-density">5</span>
  </div>
  <div class="slider-group">
    <label>コントラスト</label>
    <input type="range" id="slider-contrast" min="0" max="200" value="100">
    <span class="value" id="val-contrast">100%</span>
  </div>
  <div class="slider-group">
    <label>エッジ感度</label>
    <input type="range" id="slider-edge" min="10" max="200" value="50">
    <span class="value" id="val-edge">50</span>
  </div>
  <div class="slider-group">
    <label>明暗しきい値</label>
    <input type="range" id="slider-threshold" min="0" max="255" value="240">
    <span class="value" id="val-threshold">240</span>
  </div>
</div>

<div id="output-wrap">
  <span class="hint">画像をアップロードしてください</span>
  <canvas id="output-canvas"></canvas>
</div>

<div class="actions">
  <button class="btn" id="btn-render">再描画</button>
  <button class="btn" id="btn-save">PNG保存</button>
</div>
<div id="status"></div>

<script>
// ============================================================
// 状態
// ============================================================
const state = {
  image: null,
  imageData: null,       // グレースケール Uint8Array
  edgeAngles: null,      // Float32Array
  edgeMagnitudes: null,  // Float32Array
  contrastMap: null,     // Uint8Array
  contours: null,        // 抽出済み輪郭パス [[{x,y}, ...], ...]
  width: 0,
  height: 0,
};

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);
const inputImage = $('input-image');
const inputText  = $('input-text');
const canvas     = $('output-canvas');
const ctx        = canvas.getContext('2d');
const hint       = document.querySelector('.hint');
const statusEl   = $('status');

const sliderMin       = $('slider-min');
const sliderMax       = $('slider-max');
const sliderDensity   = $('slider-density');
const sliderContrast  = $('slider-contrast');
const sliderEdge      = $('slider-edge');
const sliderThreshold = $('slider-threshold');
const selectBg        = $('select-bg');
const selectMode      = $('select-mode');

// ============================================================
// デバウンス
// ============================================================
let renderTimer = null;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 80);
}

// ============================================================
// 画像読み込み
// ============================================================
$('btn-upload').addEventListener('click', () => inputImage.click());

inputImage.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      state.image = img;
      const scale = Math.min(1, 900 / img.width);
      state.width  = Math.floor(img.width * scale);
      state.height = Math.floor(img.height * scale);
      computeGrayscale();
      computeEdges();
      updateContrastMap();
      extractContours();
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ============================================================
// グレースケール（1回）
// ============================================================
function computeGrayscale() {
  const tmp = document.createElement('canvas');
  tmp.width = state.width; tmp.height = state.height;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(state.image, 0, 0, state.width, state.height);
  try {
    const d = tctx.getImageData(0, 0, state.width, state.height).data;
    const gray = new Uint8Array(state.width * state.height);
    for (let i = 0; i < gray.length; i++) {
      gray[i] = (0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2]) | 0;
    }
    state.imageData = gray;
  } catch (err) {
    alert('画像データの読み取りに失敗しました。ローカルサーバー経由で開いてください。');
  }
}

// ============================================================
// Sobelエッジ（1回）
// ============================================================
function computeEdges() {
  const g = state.imageData, w = state.width, h = state.height;
  const angles = new Float32Array(w * h);
  const mags   = new Float32Array(w * h);
  for (let iy = 1; iy < h - 1; iy++) {
    for (let ix = 1; ix < w - 1; ix++) {
      const idx = iy * w + ix;
      const gx =
        -g[(iy-1)*w+(ix-1)] + g[(iy-1)*w+(ix+1)]
        -2*g[iy*w+(ix-1)]   + 2*g[iy*w+(ix+1)]
        -g[(iy+1)*w+(ix-1)] + g[(iy+1)*w+(ix+1)];
      const gy =
        -g[(iy-1)*w+(ix-1)] - 2*g[(iy-1)*w+ix] - g[(iy-1)*w+(ix+1)]
        +g[(iy+1)*w+(ix-1)] + 2*g[(iy+1)*w+ix] + g[(iy+1)*w+(ix+1)];
      angles[idx] = Math.atan2(gy, gx) + Math.PI * 0.5;
      mags[idx]   = Math.sqrt(gx*gx + gy*gy);
    }
  }
  state.edgeAngles = angles;
  state.edgeMagnitudes = mags;
}

// ============================================================
// コントラストマップ
// ============================================================
function updateContrastMap() {
  if (!state.imageData) return;
  const g = state.imageData, len = g.length;
  const c = parseInt(sliderContrast.value) / 100;
  const map = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    let v = ((g[i] / 255 - 0.5) * c + 0.5) * 255 | 0;
    map[i] = v < 0 ? 0 : v > 255 ? 255 : v;
  }
  state.contrastMap = map;
}

// ============================================================
// 輪郭パス抽出（エッジ二値化 → 近傍トレース）
// ============================================================
function extractContours() {
  if (!state.edgeMagnitudes) return;
  const w = state.width, h = state.height;
  const mags = state.edgeMagnitudes;
  const edgeThreshold = parseInt(sliderEdge.value);

  // エッジ二値化
  const edgeMap = new Uint8Array(w * h);
  for (let i = 0; i < edgeMap.length; i++) {
    edgeMap[i] = mags[i] > edgeThreshold ? 1 : 0;
  }

  // 訪問フラグ
  const visited = new Uint8Array(w * h);
  const contours = [];

  // 8近傍オフセット
  const dx = [-1, 0, 1, 1, 1, 0, -1, -1];
  const dy = [-1, -1, -1, 0, 1, 1, 1, 0];

  for (let sy = 1; sy < h - 1; sy++) {
    for (let sx = 1; sx < w - 1; sx++) {
      const sidx = sy * w + sx;
      if (!edgeMap[sidx] || visited[sidx]) continue;

      // パスをトレース
      const path = [];
      let cx = sx, cy = sy;

      while (true) {
        const cidx = cy * w + cx;
        if (visited[cidx]) break;
        visited[cidx] = 1;
        path.push({ x: cx, y: cy });

        // 次の未訪問エッジ隣接ピクセルを探す
        let found = false;
        for (let d = 0; d < 8; d++) {
          const nx = cx + dx[d], ny = cy + dy[d];
          if (nx < 1 || nx >= w-1 || ny < 1 || ny >= h-1) continue;
          const nidx = ny * w + nx;
          if (edgeMap[nidx] && !visited[nidx]) {
            cx = nx; cy = ny;
            found = true;
            break;
          }
        }
        if (!found) break;
      }

      // 短すぎるパスは除外（ノイズ）
      if (path.length >= 10) {
        contours.push(path);
      }
    }
  }

  // パスを長い順にソート
  contours.sort((a, b) => b.length - a.length);
  state.contours = contours;
}

// ============================================================
// パスを滑らかにする（移動平均）
// ============================================================
function smoothPath(path, radius) {
  if (path.length < radius * 2 + 1) return path;
  const out = [];
  for (let i = 0; i < path.length; i++) {
    let sx = 0, sy = 0, count = 0;
    for (let j = -radius; j <= radius; j++) {
      const idx = Math.max(0, Math.min(path.length - 1, i + j));
      sx += path[idx].x;
      sy += path[idx].y;
      count++;
    }
    out.push({ x: sx / count, y: sy / count });
  }
  return out;
}

// ============================================================
// メイン描画
// ============================================================
function render() {
  if (!state.image || !state.contrastMap) return;
  hint.style.display = 'none';

  const t0 = performance.now();
  const w = state.width, h = state.height;
  canvas.width = w; canvas.height = h;

  const isDark    = selectBg.value === 'black';
  const mode      = selectMode.value;
  const minSize   = parseInt(sliderMin.value);
  const maxSize   = parseInt(sliderMax.value);
  const density   = parseInt(sliderDensity.value);
  const threshold = parseInt(sliderThreshold.value);
  const text      = inputText.value || 'NERDA';
  const baseStep  = 12 - density;
  const step      = Math.max(3, baseStep);

  ctx.fillStyle = isDark ? '#0a0a0a' : '#f5f5f5';
  ctx.fillRect(0, 0, w, h);

  let charCount = 0;

  if (mode === 'contour') {
    charCount = renderContour(w, h, isDark, minSize, maxSize, step, text);
  } else {
    // グリッド/フローはバケット描画
    const BUCKETS = 8;
    const sizeRange = maxSize - minSize;
    const bucketFonts = [];
    for (let b = 0; b < BUCKETS; b++) {
      const sz = Math.round(minSize + sizeRange * (b / (BUCKETS - 1)));
      bucketFonts.push(`${sz}px "Hiragino Kaku Gothic ProN", sans-serif`);
    }
    const edgeSensitivity = parseInt(sliderEdge.value);
    const chars = collectChars(w, h, step, threshold, text, mode === 'flow', minSize, sizeRange, BUCKETS, edgeSensitivity);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let b = 0; b < BUCKETS; b++) {
      const bucket = chars[b];
      if (!bucket.length) continue;
      ctx.font = bucketFonts[b];
      for (const c of bucket) {
        ctx.fillStyle = isDark
          ? `rgba(255,255,255,${c.alpha})`
          : `rgba(0,0,0,${c.alpha})`;
        if (c.angle !== 0) {
          const cos = Math.cos(c.angle), sin = Math.sin(c.angle);
          ctx.setTransform(cos, sin, -sin, cos, c.x, c.y);
          ctx.fillText(c.char, 0, 0);
        } else {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.fillText(c.char, c.x, c.y);
        }
        charCount++;
      }
    }
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const ms = (performance.now() - t0).toFixed(0);
  statusEl.textContent = `${ms}ms / ${charCount}文字 / ${mode}`;
}

// ============================================================
// パス（輪郭追従）モード描画
// ============================================================
function renderContour(w, h, isDark, minSize, maxSize, step, text) {
  if (!state.contours || state.contours.length === 0) return 0;

  const cmap = state.contrastMap;
  const fontFamily = '"Hiragino Kaku Gothic ProN", sans-serif';
  let charCount = 0;
  let ci = 0; // テキストインデックス（全パスで共有）

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 文字間隔（stepに基づく）
  const charSpacing = step * 1.2;

  for (const rawPath of state.contours) {
    // パスを滑らかにする
    const path = smoothPath(rawPath, 3);

    // パスに沿って累積距離を計算
    const distances = [0];
    for (let i = 1; i < path.length; i++) {
      const dx = path[i].x - path[i-1].x;
      const dy = path[i].y - path[i-1].y;
      distances.push(distances[i-1] + Math.sqrt(dx*dx + dy*dy));
    }
    const totalLength = distances[distances.length - 1];
    if (totalLength < charSpacing) continue;

    // パス上を等間隔で歩いて文字を配置
    let dist = 0;
    let pathIdx = 0;

    while (dist < totalLength) {
      // 現在の距離に対応するパス上の位置を補間
      while (pathIdx < distances.length - 1 && distances[pathIdx + 1] < dist) {
        pathIdx++;
      }
      if (pathIdx >= path.length - 1) break;

      const segLen = distances[pathIdx + 1] - distances[pathIdx];
      const t = segLen > 0 ? (dist - distances[pathIdx]) / segLen : 0;
      const px = path[pathIdx].x + (path[pathIdx + 1].x - path[pathIdx].x) * t;
      const py = path[pathIdx].y + (path[pathIdx + 1].y - path[pathIdx].y) * t;

      // 接線方向（この位置での進行方向）
      const lookAhead = Math.min(pathIdx + 3, path.length - 1);
      const tangentX = path[lookAhead].x - path[Math.max(0, pathIdx - 1)].x;
      const tangentY = path[lookAhead].y - path[Math.max(0, pathIdx - 1)].y;
      const angle = Math.atan2(tangentY, tangentX);

      // この位置の明度で文字サイズを決定
      const ix = px | 0, iy = py | 0;
      const idx = iy * w + ix;
      const brightness = (ix >= 0 && ix < w && iy >= 0 && iy < h) ? cmap[idx] : 128;
      const bt = 1 - brightness / 255;
      const fontSize = minSize + (maxSize - minSize) * Math.max(0.3, bt);
      const alpha = (0.3 + 0.7 * Math.max(0.2, bt)).toFixed(2);

      const char = text[ci % text.length];
      ci++;

      ctx.font = `${Math.round(fontSize)}px ${fontFamily}`;
      ctx.fillStyle = isDark
        ? `rgba(255,255,255,${alpha})`
        : `rgba(0,0,0,${alpha})`;

      const cos = Math.cos(angle), sin = Math.sin(angle);
      ctx.setTransform(cos, sin, -sin, cos, px, py);
      ctx.fillText(char, 0, 0);
      charCount++;

      dist += charSpacing;
    }
  }

  return charCount;
}

// ============================================================
// グリッド/フロー 文字収集
// ============================================================
function collectChars(w, h, step, threshold, text, isFlow, minSize, sizeRange, buckets, edgeSensitivity) {
  const result = Array.from({length: buckets}, () => []);
  const cmap = state.contrastMap;
  const angles = state.edgeAngles;
  const mags = state.edgeMagnitudes;
  let ci = 0;

  if (isFlow) {
    const lineSpacing = step * 1.5;
    for (let startY = 0; startY < h; startY += lineSpacing) {
      let x = 0, y = startY, safety = 0;
      while (x < w && y >= 0 && y < h && safety++ < 10000) {
        const ix = x | 0, iy = y | 0;
        const idx = iy * w + ix;
        const brightness = (ix >= 0 && ix < w && iy >= 0 && iy < h) ? cmap[idx] : 255;
        if (brightness <= threshold) {
          const t = 1 - brightness / 255;
          const bucket = Math.min(buckets - 1, (t * buckets) | 0);
          const alpha = (0.2 + 0.8 * t).toFixed(2);
          const angle = (idx < angles.length) ? angles[idx] : 0;
          result[bucket].push({ x, y, char: text[ci % text.length], alpha, angle });
          ci++;
        }
        const eidx = (y | 0) * w + (x | 0);
        const ea = (eidx >= 0 && eidx < angles.length) ? angles[eidx] : 0;
        const adv = step * 0.8;
        x += Math.cos(ea) * adv + step * 0.5;
        y += Math.sin(ea) * adv * 0.3;
        y = Math.max(0, Math.min(h - 1, y));
      }
    }
  } else {
    for (let y = 0; y < h; y += step) {
      for (let x = 0; x < w; x += step) {
        const idx = y * w + x;
        const brightness = cmap[idx];
        if (brightness > threshold) continue;
        const t = 1 - brightness / 255;
        const bucket = Math.min(buckets - 1, (t * buckets) | 0);
        const alpha = (0.2 + 0.8 * t).toFixed(2);
        const angle = (mags[idx] > edgeSensitivity) ? angles[idx] : 0;
        result[bucket].push({ x, y, char: text[ci % text.length], alpha, angle });
        ci++;
      }
    }
  }
  return result;
}

// ============================================================
// スライダー表示
// ============================================================
function updateSliderLabels() {
  $('val-min').textContent       = sliderMin.value + 'px';
  $('val-max').textContent       = sliderMax.value + 'px';
  $('val-density').textContent   = sliderDensity.value;
  $('val-contrast').textContent  = sliderContrast.value + '%';
  $('val-edge').textContent      = sliderEdge.value;
  $('val-threshold').textContent = sliderThreshold.value;
}

// ============================================================
// イベント
// ============================================================
[sliderMin, sliderMax, sliderDensity, sliderThreshold].forEach(s => {
  s.addEventListener('input', () => { updateSliderLabels(); scheduleRender(); });
});

sliderContrast.addEventListener('input', () => {
  updateSliderLabels();
  updateContrastMap();
  scheduleRender();
});

// エッジ感度変更→輪郭パス再抽出
sliderEdge.addEventListener('input', () => {
  updateSliderLabels();
  extractContours();
  scheduleRender();
});

selectBg.addEventListener('change', scheduleRender);
selectMode.addEventListener('change', scheduleRender);
$('btn-render').addEventListener('click', render);

$('btn-save').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'nerda_calligraphy.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

let textTimer = null;
inputText.addEventListener('input', () => {
  clearTimeout(textTimer);
  textTimer = setTimeout(render, 500);
});

updateSliderLabels();
</script>

</body>
</html>
